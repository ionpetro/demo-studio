name: Supabase keep-alive

on:
  schedule:
    # Every 3 days — well inside Supabase's 7-day free-tier inactivity window
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}")
          echo "Supabase responded with HTTP $code"
          [ "$code" = "200" ]
